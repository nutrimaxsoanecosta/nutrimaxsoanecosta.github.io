<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nutricionista Maxsoane</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
  <style>
    /* ================= PALETA DE CORES EXTRAÍDA DA IMAGEM ================= */
    :root {
      /* Cores Principais */
      --color-green-dark: #1b532b;    /* Verde escuro do texto inferior */
      --color-green-leaf: #498a28;    /* Verde folha do elemento superior */
      --color-gold: #c39a2b;          /* Dourado sofisticado da fita e texto */
      --color-terracotta: #cc6d43;    /* Laranja/terracota da linha sutil */
      
      /* Cores de Fundo e Neutros */
      --bg-cream: #f9f7f2;            /* Fundo off-white/creme suave da imagem */
      --bg-card: #ffffff;             /* Fundo puramente branco para os blocos */
      --text-dark: #2d312e;           /* Cinza quase preto para excelente legibilidade */
      --text-muted: #6e7570;          /* Cinza médio para textos secundários */
      --border-color: #e2e5e2;        /* Borda leve e natural */

      /* Mapeamento das Variáveis Funcionais do App */
      --primary-color: var(--color-green-dark);
      --accent-color: var(--color-gold);
      --bg-color: var(--bg-cream);
    }
    
    body { 
      background-color: var(--bg-color); 
      color: var(--text-dark);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column; 
      justify-content: center;
      align-items: center;
      padding: 40px 0;
      position: relative;
    }
    
    .logo-container {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      max-width: 300px;
      width: 100%;
      transition: top 1.5s cubic-bezier(0.25, 1, 0.5, 1),
                  left 1.2s cubic-bezier(0.25, 1, 0.5, 1),
                  transform 1.5s cubic-bezier(0.25, 1, 0.5, 1),
                  max-width 1.5s cubic-bezier(0.25, 1, 0.5, 1);
      z-index: 1000;
    }
    .logo-container img {
      max-height: 300px;
      max-width: 100%;
      height: auto;
      object-fit: contain;
      transition: max-height 1.5s cubic-bezier(0.25, 1, 0.5, 1);
    }

    .quiz-carregado .logo-container {
      top: 10px;
      left: 20px;
      transform: translate(0, 0); 
      max-width: 120px;
    }
    .quiz-carregado .logo-container img {
      max-height: 120px;
    }

    .quiz-container {
      max-width: 700px;
      width: 100%;
      margin: 0 auto;
    }
    .card {
      background-color: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 20px;
      box-shadow: 0 12px 35px rgba(27, 83, 43, 0.06); /* Sombra leve esverdeada */
      min-height: 350px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      transition: all 0.3s ease;
    }
    .progress {
      background-color: rgba(195, 154, 43, 0.15); /* Dourado suave de fundo */
      height: 8px;
      border-radius: 4px;
      margin-bottom: 30px;
    }
    .progress-bar {
      background-color: var(--accent-color) !important; /* Barra em Dourado */
    }
    .bloco-tag {
      font-size: 0.8rem;
      text-transform: uppercase;
      color: var(--accent-color); /* Realce em Dourado */
      font-weight: 700;
      letter-spacing: 1.5px;
      margin-bottom: 12px;
      display: block;
    }
    .question-text {
      font-size: 1.4rem;
      font-weight: 600;
      color: var(--primary-color); /* Título em Verde Escuro */
      margin-bottom: 25px;
    }
    .option-item {
      margin-bottom: 12px;
    }
    .btn-nav {
      padding: 12px 30px;
      border-radius: 10px;
      font-weight: 600;
      transition: all 0.2s ease;
    }
    .btn-next { 
      background-color: var(--primary-color); 
      color: white; 
      border: none;
    }
    .btn-next:hover { 
      background-color: var(--color-green-leaf); 
      color: white; 
      transform: translateY(-1px);
    }
    .btn-outline-secondary {
      color: var(--text-muted);
      border-color: var(--border-color);
    }
    .btn-outline-secondary:hover {
      background-color: var(--border-color);
      color: var(--text-dark);
      border-color: var(--border-color);
    }
    .btn-success {
      background-color: var(--color-green-leaf) !important;
      border-color: var(--color-green-leaf) !important;
    }
    .btn-success:hover {
      background-color: var(--color-green-dark) !important;
      border-color: var(--color-green-dark) !important;
    }
    
    .hidden { display: none !important; }
    
    .custom-option {
      border: 2px solid var(--border-color);
      padding: 16px;
      border-radius: 15px;
      cursor: pointer;
      transition: all 0.2s;
      display: block;
      background-color: var(--bg-card);
      color: var(--text-dark);
    }
    .custom-option:hover { 
      background-color: rgba(73, 138, 40, 0.04); /* Light mist de verde folha */
      border-color: var(--color-green-leaf); 
    }
    
    input[type="radio"]:checked + .custom-option {
      background-color: rgba(27, 83, 43, 0.06); /* Fundo sutil Verde Escuro */
      border-color: var(--primary-color);
      color: var(--primary-color);
      font-weight: 600;
      box-shadow: 0 0 0 1px var(--primary-color);
    }

    .form-control:focus {
      border-color: var(--primary-color);
      box-shadow: 0 0 0 0.25rem rgba(27, 83, 43, 0.15);
    }

    .spinner-border {
      color: var(--primary-color) !important;
    }

    @media(max-width: 576px) {
      .quiz-carregado .logo-container {
        top: 10px;
        left: 15px;
        max-width: 80px;
      }
      .quiz-container {
        margin-top: 50px;
      }
    }
  </style>
</head>
<body>

  <div class="logo-container">
    <img id="logoQuiz" class="hidden" alt="Logo">
  </div>

  <div class="container quiz-container">
    <div id="progressContainer" class="progress hidden">
      <div id="progressBar" class="progress-bar" role="progressbar" style="width: 0%"></div>
    </div>

    <div id="loading" class="hidden text-center p-5 bg-white rounded-4 shadow-sm">
      <div class="spinner-border" role="status"></div>
      <p class="mt-3 mb-0 fw-semibold text-secondary">Preparando suas perguntas...</p>
    </div>

    <form id="quizForm" class="hidden">
      <div id="alertContainer" class="hidden"></div>
      <div id="questionWrapper" class="animate__animated"></div>

      <div class="d-flex justify-content-between mt-4">
        <button type="button" id="btnPrev" class="btn btn-outline-secondary btn-nav hidden">Anterior</button>
        <button type="button" id="btnNext" class="btn btn-next btn-nav ms-auto">Próxima</button>
        <button type="submit" id="btnSubmit" class="btn btn-success btn-nav ms-auto hidden">Finalizar e Enviar</button>
      </div>
    </form>
  </div>

  <script>
    // ================= CONFIGURAÇÃO =================
    const URL_APPS_SCRIPT = 'https://script.google.com/macros/s/AKfycbw7v79BFWxfMGayISsQKskuECx9NmPq0otFfhSn3seds-uFI8p_7TIGTpGJILDLq4Xh/exec';
    const numeroWhatsapp = '5527992657445'; 
    const URL_ARQUIVO_LOGO = 'logo.txt'; 
    // ================================================

    let perguntas = [];
    let indiceAtual = 0;
    let respostasTotal = {};
    let historicoIndices = []; 

    document.addEventListener("DOMContentLoaded", function() {
      const formElement = document.getElementById('quizForm');
      if (formElement) {
        formElement.addEventListener('submit', executingEnvioFormulario);
      }

      document.getElementById('btnPrev').addEventListener('click', () => mudarPergunta(-1));
      document.getElementById('btnNext').addEventListener('click', () => mudarPergunta(1));

      carregarLogoBase64();
      
      setTimeout(() => {
        document.body.classList.add('quiz-carregado');
        const loadingDiv = document.getElementById('loading');
        if (loadingDiv) loadingDiv.classList.remove('hidden');
        obterPerguntasDoServidor();
      }, 3000);
    });

    function carregarLogoBase64() {
      if (!URL_ARQUIVO_LOGO) return;

      fetch(URL_ARQUIVO_LOGO)
        .then(response => {
          if (!response.ok) throw new Error('Não foi possível carregar o arquivo da logo.');
          return response.text();
        })
        .then(conteudoBase64 => {
          const logoImg = document.getElementById('logoQuiz');
          let base64Limpo = conteudoBase64.trim();
          if (logoImg && base64Limpo !== "") {
            if (!base64Limpo.startsWith('data:image')) {
              base64Limpo = 'data:image/png;base64,' + base64Limpo;
            }
            logoImg.src = base64Limpo;
            logoImg.classList.remove('hidden');
          }
        })
        .catch(erro => console.error('Erro ao carregar a logo:', erro));
    }

    function obterPerguntasDoServidor() {
      fetch(URL_APPS_SCRIPT, {
        method: 'GET',
        redirect: 'follow'
      })
      .then(response => {
        if (!response.ok) throw new Error('Erro na rede ou URL inválida.');
        return response.json();
      })
      .then(dados => {
        inicializarQuiz(dados);
      })
      .catch(erro => {
        exibirErroServidor(erro);
      });
    }

    function exibirFeedbackMensagem(mensagem, tipo = 'warning') {
      const alertContainer = document.getElementById('alertContainer');
      if (!alertContainer) return;

      const icone = tipo === 'danger' ? '❌ ' : '⚠️ ';
      alertContainer.innerHTML = `
        <div class="alert alert-${tipo} d-flex align-items-center animate__animated animate__headShake shadow-sm mb-3" role="alert" style="border-radius: 12px;">
          <div class="fw-semibold">${icone} ${mensagem}</div>
        </div>
      `;
      alertContainer.classList.remove('hidden');
      alertContainer.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    function limparFeedbackMensagem() {
      const alertContainer = document.getElementById('alertContainer');
      if (alertContainer) {
        alertContainer.classList.add('hidden');
        alertContainer.innerHTML = '';
      }
    }

    function exibirErroServidor(erro) {
      console.error(erro);
      const loadingDiv = document.getElementById('loading');
      const progressContainer = document.getElementById('progressContainer');
      
      if (progressContainer) progressContainer.classList.add('hidden');

      if (loadingDiv) {
        loadingDiv.innerHTML = `
          <div class="alert alert-danger m-0 text-start">
            <h5 class="alert-heading">❌ Erro ao Carregar Perguntas</h5>
            <p class="mb-2"><strong>Detalhes:</strong> ${erro.message}</p>
            <hr>
            <small class="text-muted">Certifique-se de que o Web App do Apps Script está publicado como "Qualquer pessoa" (Anyone) e que a URL está correta.</small>
          </div>
        `;
      }
    }

    function inicializarQuiz(dados) {
      const loadingDiv = document.getElementById('loading');
      const formDiv = document.getElementById('quizForm');
      const progressContainer = document.getElementById('progressContainer');

      if (!dados || dados.length === 0) {
        if (loadingDiv) {
          loadingDiv.innerHTML = '<div class="alert alert-warning m-0">Nenhuma pergunta localizada para hoje com os critérios de filtro.</div>';
        }
        if (progressContainer) progressContainer.classList.add('hidden');
        return;
      }
      
      perguntas = dados;
      
      if (loadingDiv) loadingDiv.classList.add('hidden');
      if (formDiv) formDiv.classList.remove('hidden');
      if (progressContainer) progressContainer.classList.remove('hidden');
      
      indiceAtual = 0;
      if (devePularPergunta(indiceAtual)) {
        indiceAtual = encontrarProximoIndiceValido(indiceAtual, 1);
      }
      
      renderizarPergunta();
    }

    function escaparHTML(string) {
      const mapa = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#x27;' };
      return String(string).replace(/[&<>"']/g, s => mapa[s]);
    }

    function renderizarPergunta() {
      if (indiceAtual >= perguntas.length || indiceAtual < 0) return;

      limparFeedbackMensagem();

      const p = perguntas[indiceAtual];
      const wrapper = document.getElementById('questionWrapper');
      if (!wrapper) return;
      
      wrapper.classList.remove('animate__fadeIn');
      void wrapper.offsetWidth; 
      wrapper.classList.add('animate__fadeIn');

      let htmlOpcoes = '';

      if (p.opcoes && p.opcoes.length > 0 && p.opcoes[0] !== "") {
        p.opcoes.forEach((opcao, i) => {
          const checked = respostasTotal[p.id] === opcao ? 'checked' : '';
          htmlOpcoes += `
            <div class="option-item">
              <input class="form-check-input hidden" type="radio" name="${escaparHTML(p.id)}" id="opt_${i}" value="${escaparHTML(opcao)}" ${checked} onchange="salvarResposta('${escaparHTML(p.id)}', this.value)">
              <label class="custom-option" for="opt_${i}">${escaparHTML(opcao)}</label>
            </div>
          `;
        });
      } else {
        const valorTexto = respostasTotal[p.id] || '';
        htmlOpcoes += `
          <textarea class="form-control form-control-lg" rows="4" placeholder="Sua resposta aqui..." oninput="salvarResposta('${escaparHTML(p.id)}', this.value)">${escaparHTML(valorTexto)}</textarea>
        `;
      }

      wrapper.innerHTML = `
        <div class="card p-4 p-md-5">
          <span class="bloco-tag">${escaparHTML(p.bloco)}</span>
          <div class="question-text">${escaparHTML(p.pergunta)}</div>
          <div class="options-container">${htmlOpcoes}</div>
        </div>
      `;
      
      atualizarInterface();
    }

    function salvarResposta(id, valor) {
      respostasTotal[id] = valor;
      if(valor.trim() !== "") {
        limparFeedbackMensagem();
      }
    }

    function devePularPergunta(idx) {
      const perguntaAvaliada = perguntas[idx];
      const pai = perguntas.find(p => {
        if (!p.proximaRaw) return false;
        const matches = p.proximaRaw.match(/[A-Za-z]+\d+/g);
        return matches && matches.map(m => m.trim()).includes(perguntaAvaliada.id);
      });

      if (!pai) return false;

      const respostaDoPai = respostasTotal[pai.id];
      if (!respostaDoPai) return true;

      const condicionalLimpa = pai.proximaRaw.toLowerCase();
      const respostaLimpa = respostaDoPai.toLowerCase().trim();
      const idFilhoLimpo = perguntaAvaliada.id.toLowerCase();

      const possuiMatchCondicional = condicionalLimpa.includes(respostaLimpa) && condicionalLimpa.includes(idFilhoLimpo);
      
      if (!possuiMatchCondicional) {
        limparRespostasEmCascata(perguntaAvaliada.id);
        return true; 
      }

      return false;
    }

    function limparRespostasEmCascata(idPergunta) {
      if (respostasTotal[idPergunta]) delete respostasTotal[idPergunta];
      
      perguntas.forEach(p => {
        if (p.proximaRaw) {
          const matches = p.proximaRaw.match(/[A-Za-z]+\d+/g);
          if (matches && matches.map(m => m.trim()).includes(idPergunta)) {
            limparRespostasEmCascata(p.id);
          }
        }
      });
    }

    function encontrarProximoIndiceValido(indicePartida, direcao) {
      let idx = indicePartida + direcao;
      while (idx >= 0 && idx < perguntas.length) {
        if (!devePularPergunta(idx)) {
          return idx;
        }
        idx += direcao;
      }
      return idx; 
    }

    function mudarPergunta(direcao) {
      if (direcao === 1) {
        const p = perguntas[indiceAtual];
        if (!respostasTotal[p.id] || respostasTotal[p.id].trim() === "") {
          exibirFeedbackMensagem("Esta pergunta é obrigatória!");
          return;
        }
        
        historicoIndices.push(indiceAtual);
        indiceAtual = encontrarProximoIndiceValido(indiceAtual, 1);
      } else {
        if (historicoIndices.length > 0) {
          indiceAtual = historicoIndices.pop();
        } else {
          indiceAtual = encontrarProximoIndiceValido(indiceAtual, -1);
        }
      }

      renderizarPergunta();
    }

    function atualizarInterface() {
      const total = perguntas.length;
      const progresso = ((indiceAtual + 1) / total) * 100;
      
      const progressBar = document.getElementById('progressBar');
      const btnPrev = document.getElementById('btnPrev');
      const btnNext = document.getElementById('btnNext');
      const btnSubmit = document.getElementById('btnSubmit');

      if (progressBar) progressBar.style.width = `${progresso}%`;
      if (btnPrev) btnPrev.classList.toggle('hidden', historicoIndices.length === 0);

      const proximoValido = encontrarProximoIndiceValido(indiceAtual, 1);

      if (proximoValido >= total) {
        if (btnNext) btnNext.classList.add('hidden');
        if (btnSubmit) btnSubmit.classList.remove('hidden');
      } else {
        if (btnNext) btnNext.classList.remove('hidden');
        if (btnSubmit) btnSubmit.classList.add('hidden');
      }
    }

    function executingEnvioFormulario(e) {
      e.preventDefault();
      
      const p = perguntas[indiceAtual];
      if (!respostasTotal[p.id] || respostasTotal[p.id].trim() === "") {
        exibirFeedbackMensagem("Esta pergunta é obrigatória!");
        return;
      }

      let mensagemFormatada = "*📋 FORMULÁRIO DE ACOMPANHAMENTO*\n\n";

      perguntas.forEach((p, idx) => {
        if (!devePularPergunta(idx) && respostasTotal[p.id] !== undefined) {
          mensagemFormatada += `*${p.pergunta}*\n✍️ _${respostasTotal[p.id]}_\n\n`;
        }
      });

      const mensagemUrlEncoded = encodeURIComponent(mensagemFormatada);
      let urlWhatsapp = `https://api.whatsapp.com/send?text=${mensagemUrlEncoded}`;
      
      if (numeroWhatsapp && numeroWhatsapp.trim() !== "") {
        urlWhatsapp += `&phone=${numeroWhatsapp.replace(/\D/g, '')}`;
      }

      window.open(urlWhatsapp, '_blank');

      document.body.innerHTML = `
        <div class="container text-center quiz-container">
          <div class="card p-5 animate__animated animate__bounceIn">
            <h2 style="color: var(--color-green-dark)">Respondido!</h2>
            <p class="mt-2">Você foi redirecionado para o WhatsApp para enviar suas respostas.</p>
            <p class="text-muted small">Se a janela não abriu, verifique se o seu navegador bloqueou o pop-up.</p>
            <button class="btn btn-next mt-3" onclick="window.location.reload()">Responder Novamente</button>
          </div>
        </div>
      `;
    }
  </script>
</body>
</html>
